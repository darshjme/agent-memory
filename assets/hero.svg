<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <style>
      .bg{fill:#0d1117}
      .title{font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:700;fill:#e6edf3}
      .subtitle{font-family:'JetBrains Mono',monospace;font-size:13px;fill:#8b949e}
      .tag{font-family:monospace;font-size:9px;fill:#cc9933}
      .box{fill:#161b22;stroke:#30363d;stroke-width:1.5}
      .mem-entry{fill:#1f2d3d;stroke:#1f6feb;stroke-width:1}
      .ep-entry{fill:#2d1f3d;stroke:#8957e5;stroke-width:1}
      .lbl{font-family:monospace;font-size:10px;fill:#8b949e;text-anchor:middle}
      .lbl-blue{fill:#58a6ff}
      .lbl-purple{fill:#d2a8ff}
      @keyframes slide{0%{transform:translateY(0)}100%{transform:translateY(-20px);opacity:0}}
      @keyframes pulse{0%,100%{opacity:0.5}50%{opacity:1}}
      .new-mem{animation:pulse 1.5s ease-in-out infinite}
    </style>
  </defs>
  <rect width="800" height="300" class="bg"/>

  <!-- Title -->
  <text x="40" y="50" class="title">engram</text>
  <text x="40" y="72" class="subtitle">In-process memory for ReAct agents</text>
  <text x="40" y="90" class="tag">Short-term context. Episodic recall. Zero dependencies.</text>

  <!-- Short-term memory column -->
  <text x="210" y="120" font-family="monospace" font-size="11" fill="#58a6ff" text-anchor="middle">Short-Term</text>
  <text x="210" y="134" font-family="monospace" font-size="9" fill="#8b949e" text-anchor="middle">sliding window</text>

  <rect x="140" y="142" width="140" height="22" rx="4" class="new-mem" fill="#1f2d3d" stroke="#1f6feb" stroke-width="1.5"/>
  <text x="210" y="157" class="lbl lbl-blue">observation: API returned 404</text>

  <rect x="140" y="168" width="140" height="22" rx="4" class="mem-entry"/>
  <text x="210" y="183" class="lbl">action: retry with backoff</text>

  <rect x="140" y="194" width="140" height="22" rx="4" class="mem-entry"/>
  <text x="210" y="209" class="lbl">observation: success (200)</text>

  <rect x="140" y="220" width="140" height="22" rx="4" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <text x="210" y="235" class="lbl" fill="#484f58">... (evicted)</text>

  <!-- Episodic memory column -->
  <text x="520" y="120" font-family="monospace" font-size="11" fill="#d2a8ff" text-anchor="middle">Episodic</text>
  <text x="520" y="134" font-family="monospace" font-size="9" fill="#8b949e" text-anchor="middle">key events, permanent</text>

  <rect x="450" y="142" width="140" height="22" rx="4" fill="#2d1f3d" stroke="#8957e5" stroke-width="1.5"/>
  <text x="520" y="157" class="lbl lbl-purple">🔑 auth token refreshed</text>

  <rect x="450" y="168" width="140" height="22" rx="4" class="ep-entry"/>
  <text x="520" y="183" class="lbl lbl-purple">🔑 rate limit hit at 3pm</text>

  <rect x="450" y="194" width="140" height="22" rx="4" class="ep-entry"/>
  <text x="520" y="209" class="lbl lbl-purple">🔑 task completed: deploy</text>

  <!-- AgentMemory center label -->
  <rect x="330" y="155" width="120" height="50" rx="8" fill="#161b22" stroke="#cc9933" stroke-width="2"/>
  <text x="390" y="178" font-family="monospace" font-size="11" fill="#cc9933" text-anchor="middle">AgentMemory</text>
  <text x="390" y="194" font-family="monospace" font-size="9" fill="#8b949e" text-anchor="middle">observe · act · recall</text>

  <!-- Connecting arrows -->
  <line x1="282" y1="180" x2="326" y2="180" stroke="#1f6feb" stroke-width="1.5" stroke-dasharray="3 3"/>
  <line x1="452" y1="180" x2="454" y2="180" stroke="#8957e5" stroke-width="1.5" stroke-dasharray="3 3"/>

  <!-- Bottom pills -->
  <rect x="40" y="265" width="100" height="22" rx="11" fill="#161b22" stroke="#30363d"/>
  <text x="90" y="280" font-family="monospace" font-size="9" fill="#8b949e" text-anchor="middle">no database</text>
  <rect x="152" y="265" width="100" height="22" rx="11" fill="#161b22" stroke="#30363d"/>
  <text x="202" y="280" font-family="monospace" font-size="9" fill="#8b949e" text-anchor="middle">in-process</text>
  <rect x="264" y="265" width="110" height="22" rx="11" fill="#161b22" stroke="#30363d"/>
  <text x="319" y="280" font-family="monospace" font-size="9" fill="#8b949e" text-anchor="middle">zero deps</text>
  <rect x="386" y="265" width="130" height="22" rx="11" fill="#161b22" stroke="#30363d"/>
  <text x="451" y="280" font-family="monospace" font-size="9" fill="#8b949e" text-anchor="middle">sliding window</text>
</svg>
